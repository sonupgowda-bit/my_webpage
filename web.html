<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website with Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; color: #333; line-height: 1.6; background-color: #f4f7f6; }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 1rem 10%;
            background: #faf8f8;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav ul { display: flex; list-style: none; align-items: center; }
        nav ul li { margin-left: 20px; }
        nav ul li a { text-decoration: none; color: #333; font-weight: 500; }

        /* Login Button Style */
        .btn-login {
            background: #2563eb;
            color: white !important;
            padding: 8px 20px;
            border-radius: 5px;
        }

        /* Login Form Container */
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .login-container h2 { margin-bottom: 20px; text-align: center; }

        /* Form Elements */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #323437;
            color: rgb(159, 205, 237);
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #bac5e5; }

        footer { text-align: center; padding: 2rem; margin-top: 50px; color: #777; }
    </style>
</head>
<body>

    <nav>
        <div style="font-size: 1.5rem; font-weight: bold; color: #2563eb;">BrandName</div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">setting</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#login" class="btn-login">Login</a></li>
        </ul>
    </nav>

    <div id="login" class="login-container">
        <h2>Account Login</h2>
        <form action="/submit-login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="submit-btn">Sign In</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.9rem; text-align: center;">
            <a href="#" style="color: #25ebc0; text-decoration: none;">Forgot password?</a>
        </p>
    </div>

    <footer>
        <p>&copy; 2026 BrandName. All rights reserved.</p>
    </footer>

</body>
</html>
